<html lang="tr">

    <style>

        .login-page { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a1628, #1a2a4a); display: flex; justify-content: center; align-items: center; }
        .login-container { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; width: 400px; }
        .login-container h1 { color: white; text-align: center; margin-bottom: 20px; }
        .login-container h1 span { color: #4fc3f7; }
        .login-container input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 14px; }
        .login-container input:focus { outline: none; border-color: #4fc3f7; }
        .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #4fc3f7, #0288d1); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(79,195,247,0.4); }
        .main-page { display: none; padding: 20px; background: #f5f7fb; min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .sac-tab-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        .sac-tab { padding: 10px 25px; background: #f0f0f0; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
        .sac-tab.active { background: #2196f3; color: white; }
        .sac-tab:hover:not(.active) { background: #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #e0e0e0; padding: 10px 12px; text-align: center; vertical-align: middle; }
        th { background: #2c3e50; color: white; position: sticky; top: 0; font-weight: 600; }
        .excel-aktarilmis { background-color: #e8f5e9 !important; }
        .excel-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .excel-badge.aktarildi { background: #4caf50; color: white; }
        .excel-badge.aktarilmadi { background: #95a5a6; color: white; }
        .btn { padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; margin: 3px; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .btn-success { background: #27ae60; color: white; }
        .btn-info { background: #00bcd4; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #7f8c8d; color: white; }
        .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .pagination button { padding: 6px 12px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 6px; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .filtre-satir { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; align-items: flex-end; }
        .filtre-satir input, .filtre-satir select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; min-width: 130px; font-size: 13px; }
        .filtre-satir label { display: flex; align-items: center; gap: 6px; background: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 24px; border-radius: 8px; z-index: 9999; animation: fadeOut 3s ease; font-size: 14px; }
        @keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 70% { opacity: 1; } 100% { opacity: 0; transform: translateY(20px); } }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px 20px; background: #e8f4f8; border-radius: 12px; }
        .loading { text-align: center; padding: 50px; color: #666; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .gecmis-table-container { max-height: 550px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 10px; margin-top: 10px; }
        .admin-badge { background: #8e44ad; color: white; padding: 3px 12px; border-radius: 20px; font-size: 11px; margin-left: 8px; }
        .secili-info { background: #2196f3; color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .ozet-container { background: linear-gradient(135deg, #1a237e, #283593); padding: 20px; border-radius: 12px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-around; color: white; }
        .ozet-item { text-align: center; background: rgba(255,255,255,0.12); padding: 12px 20px; border-radius: 10px; min-width: 120px; }
        .ozet-deger { font-size: 24px; font-weight: 700; }
        .action-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; justify-content: space-between; }
        .refresh-btn { background: #2196f3; color: white; }
        .checkbox-col { width: 40px; }
    </style>
</head>
<body>

<div class="login-page" id="loginPage">
    <div class="login-container">
        <h1>🔄 <span>SAC</span> ENTEGRE</h1>
        <p style="color: #90a4ae; text-align: center; margin-bottom: 20px;">Tüm Kesim Takip Sistemi</p>
        <input type="text" id="loginUsername" placeholder="Kullanıcı Adı">
        <input type="password" id="loginPassword" placeholder="Şifre">
        <button class="login-btn" id="loginBtn">GİRİŞ YAP</button>
        <div id="loginError" style="color: #ef5350; margin-top: 12px; text-align: center; display: none;">Kullanıcı adı veya şifre hatalı!</div>
    </div>
</div>

<div class="main-page" id="mainPage">
    <div class="container">
        <div class="user-info">
            <span>👤 <span id="currentUser"></span> <span id="userRolBadge"></span></span>
            <button class="logout-btn" id="logoutBtn">Çıkış Yap</button>
        </div>
        
        <div class="sac-tab-bar">
            <button class="sac-tab active" data-sac="all">📊 TÜMÜ</button>
            <button class="sac-tab" data-sac="sac1">🔵 SAC1</button>
            <button class="sac-tab" data-sac="sac2">🟠 SAC2</button>
            <button class="sac-tab" data-sac="sac3">🟢 SAC3</button>
            <button class="sac-tab" data-sac="sac4">🟣 SAC4</button>
        </div>
        
        <div class="filtre-satir">
            <input type="text" id="filtre_seri" placeholder="Seri No">
            <input type="text" id="filtre_sira" placeholder="Sıra No">
            <select id="filtre_grup">
                <option value="">Tüm Gruplar</option>
                <option value="430">430</option>
                <option value="DKP">DKP</option>
                <option value="GALVANIZ">GALVANİZ</option>
                <option value="304">304</option>
                <option value="316">316</option>
                <option value="201">201</option>
            </select>
            <input type="date" id="filtre_tarih">
            <label><input type="checkbox" id="filtre_excel"> ✅ Sadece Excel Aktarılmış</label>
            <button class="btn btn-info" id="filtreUygulaBtn">🔍 Filtrele</button>
            <button class="btn btn-secondary" id="filtreTemizleBtn">🗑️ Temizle</button>
            <button class="btn refresh-btn" id="refreshBtn">🔄 Yenile</button>
        </div>
        
        <div class="action-bar">
            <div>
                <button class="btn btn-success" id="excelAktarBtn">📎 Seçilenleri Excel'e Aktar ve KALICI İşaretle</button>
                <button class="btn btn-secondary" id="tumunuSecBtn">☑️ Tümünü Seç</button>
                <button class="btn btn-secondary" id="secimiTemizleBtn">⬜ Seçimi Temizle</button>
                <button class="btn btn-danger" id="isaretKaldirBtn" style="display:none">⚠️ İşareti Kaldır (Admin)</button>
            </div>
            <div>
                <input type="date" id="ozetBas" placeholder="Başlangıç" style="padding: 6px 10px;">
                <span>➡</span>
                <input type="date" id="ozetBit" placeholder="Bitiş" style="padding: 6px 10px;">
                <button class="btn btn-warning" id="ozetBtn">📊 Özet Göster</button>
            </div>
            <span class="secili-info">✅ <span id="seciliSayi">0</span> evrak seçili</span>
        </div>
        
        <div id="ozetAlani" style="display: none;"></div>
        
        <div style="margin-bottom: 10px;">
            <span id="kayitSayisi" style="padding: 6px 16px; background: #e8f4f8; border-radius: 20px; font-size: 13px; font-weight: 500;"></span>
        </div>
        
        <div class="gecmis-table-container" id="tabloContainer">
            <div class="loading"><div class="spinner"></div> Veriler yükleniyor...</div>
        </div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<script>
// ==================== FIREBASE KONFİGÜRASYONLARI ====================
const FIREBASE_CONFIGS = {
    sac1: {
        apiKey: "AIzaSyDDFOpgvi0r3YHsZvYV6JgdCrZp1QZazPY",
        authDomain: "sac1-kesim.firebaseapp.com",
        databaseURL: "https://sac1-kesim-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sac1-kesim",
        storageBucket: "sac1-kesim.firebasestorage.app",
        messagingSenderId: "419582241444",
        appId: "1:419582241444:web:2fdb127ca47bae8a011431"
    },
    sac2: {
        apiKey: "AIzaSyDTYnX6lNtrMOr5CJ98MTPrKp6vwR2JeZM",
        authDomain: "sac2-kesim.firebaseapp.com",
        databaseURL: "https://sac2-kesim-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sac2-kesim",
        storageBucket: "sac2-kesim.firebasestorage.app",
        messagingSenderId: "385295068161",
        appId: "1:385295068161:web:ddd269dd34f66753d8a400"
    },
    sac3: {
        apiKey: "AIzaSyDHxIkQgAnazAVkNngUsSaII3Ij7DIvj9s",
        authDomain: "sac3-kesim.firebaseapp.com",
        databaseURL: "https://sac3-kesim-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sac3-kesim",
        storageBucket: "sac3-kesim.firebasestorage.app",
        messagingSenderId: "365842219004",
        appId: "1:365842219004:web:91aaf46917786f8d9e7c79"
    },
    sac4: {
        apiKey: "AIzaSyAmlL-xVTWjahrz1VjXx-i86i0TuJ7HBdw",
        authDomain: "sac4-kesim.firebaseapp.com",
        databaseURL: "https://sac4-kesim-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sac4-kesim",
        storageBucket: "sac4-kesim.firebasestorage.app",
        messagingSenderId: "62938924671",
        appId: "1:62938924671:web:a23687f982c53db6fa214a"
    }
};

// ==================== KULLANICILAR ====================
const USERS = { SAC1: "sac1sac", Muhammed: "mhm2468", Burak: "brk2468" };
const ADMINS = ["Muhammed", "Burak"];

// ==================== GLOBAL DEĞİŞKENLER ====================
let currentUser = null;
let activeSac = "all";
let allData = [];           // Tüm evraklar (id, sac, excel durumu vb.)
let displayData = [];
let selectedIds = new Set();
let currentPage = 1;
let pageSize = 20;

let firebaseApps = {};
let firebaseDBs = {};

// ==================== FIREBASE BAŞLAT ====================
function initFirebase() {
    for (let [name, config] of Object.entries(FIREBASE_CONFIGS)) {
        try {
            // Her SAC için ayrı bir Firebase uygulaması oluştur
            let app = firebase.initializeApp(config, name);
            firebaseApps[name] = app;
            firebaseDBs[name] = firebase.database(app);
            console.log(`✅ ${name.toUpperCase()} Firebase başlatıldı`);
        } catch(e) {
            console.warn(`${name} başlatılamadı:`, e);
        }
    }
}

// ==================== YARDIMCI FONKSİYONLAR ====================
function getEvrakId(sac, item) {
    return `${sac}_${item["Seri No"] || "SD"}_${item["Sıra No"]}`;
}

function tarihParse(tarihStr) {
    if (!tarihStr) return null;
    let parts = tarihStr.split('.');
    if (parts.length !== 3) return null;
    return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
}

function showToast(msg, isError = false) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.backgroundColor = isError ? '#e74c3c' : '#27ae60';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function isAdmin() { return ADMINS.includes(currentUser); }

// ==================== VERİ YÜKLEME ====================
async function loadAllData() {
    document.getElementById("tabloContainer").innerHTML = '<div class="loading"><div class="spinner"></div> Tüm SAC verileri yükleniyor...</div>';
    
    let newAllData = [];
    
    for (let [sacName, db] of Object.entries(firebaseDBs)) {
        try {
            console.log(`📁 ${sacName} verileri çekiliyor...`);
            const snapshot = await db.ref(`${sacName}Kesim/`).once('value');
            const data = snapshot.val();
            
            let records = [];
            if (data && data.gecmisVeriler) records = data.gecmisVeriler;
            else if (data && Array.isArray(data)) records = data;
            
            // Excel aktarılanları al
            const excelRecords = (data && data.excelAktarilanlar) ? data.excelAktarilanlar : {};
            console.log(`   Excel kayıtları:`, Object.keys(excelRecords).length);
            
            for (let item of records) {
                const evrakId = getEvrakId(sacName, item);
                const isExcel = excelRecords[evrakId] ? true : false;
                
                newAllData.push({
                    ...item,
                    _sac: sacName.toUpperCase(),
                    _sacKey: sacName,
                    _id: evrakId,
                    _excel: isExcel,
                    _excelDate: excelRecords[evrakId] ? excelRecords[evrakId].tarih : null
                });
            }
            
            console.log(`   ${sacName.toUpperCase()}: ${records.length} kayıt, Excel: ${records.filter((_, idx) => {
                let id = getEvrakId(sacName, records[idx]);
                return excelRecords[id];
            }).length}`);
            
        } catch(e) {
            console.error(`${sacName} hatası:`, e);
        }
    }
    
    allData = newAllData;
    console.log(`✅ TOPLAM: ${allData.length} kayıt yüklendi`);
    
    filterData();
}

// ==================== FİLTRELE ====================
function filterData() {
    let source = [...allData];
    
    if (activeSac !== "all") {
        source = source.filter(item => item._sacKey === activeSac);
    }
    
    const seriFilter = document.getElementById("filtre_seri").value.toLowerCase();
    const siraFilter = document.getElementById("filtre_sira").value.toLowerCase();
    const grupFilter = document.getElementById("filtre_grup").value;
    const tarihFilter = document.getElementById("filtre_tarih").value;
    const onlyExcel = document.getElementById("filtre_excel").checked;
    
    displayData = source.filter(item => {
        if (seriFilter && !(item["Seri No"] || "").toLowerCase().includes(seriFilter)) return false;
        if (siraFilter && !(item["Sıra No"] || "").toString().toLowerCase().includes(siraFilter)) return false;
        if (grupFilter && item["Grup"] !== grupFilter) return false;
        if (tarihFilter) {
            let itemTarih = item["Kayıt Tarihi"] || "";
            let filterTarih = new Date(tarihFilter).toLocaleDateString('tr-TR');
            if (itemTarih !== filterTarih) return false;
        }
        if (onlyExcel && !item._excel) return false;
        return true;
    });
    
    currentPage = 1;
    renderTable();
}

// ==================== TABLO GÖSTER ====================
function renderTable() {
    const totalPages = Math.ceil(displayData.length / pageSize);
    if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    
    const start = (currentPage - 1) * pageSize;
    const pageData = displayData.slice(start, start + pageSize);
    const excelCount = displayData.filter(i => i._excel).length;
    
    document.getElementById("kayitSayisi").innerHTML = `📊 Toplam: ${displayData.length} evrak (${excelCount} Excel aktarılmış) | Sayfa ${currentPage}/${totalPages || 1}`;
    
    if (displayData.length === 0) {
        document.getElementById("tabloContainer").innerHTML = '<div class="loading">📭 Kayıt bulunmuyor.</div>';
        document.getElementById("pagination").innerHTML = "";
        document.getElementById("seciliSayi").innerHTML = selectedIds.size;
        return;
    }
    
    let html = `<table style="width:100%;">
        <thead>
            <tr>
                <th class="checkbox-col"><input type="checkbox" id="selectAllCheck"></th>
                <th>SAC</th>
                <th>Seri No</th>
                <th>Sıra No</th>
                <th>Grup</th>
                <th>Oluşturan</th>
                <th>Kayıt Tarihi</th>
                <th>Excel Durumu</th>
                <th>İşlem</th>
            </tr>
        </thead>
        <tbody>`;
    
    pageData.forEach(item => {
        const isChecked = selectedIds.has(item._id);
        const rowClass = item._excel ? 'excel-aktarilmis' : '';
        const statusHtml = item._excel ? 
            '<span class="excel-badge aktarildi">✅ AKTARILDI</span>' : 
            '<span class="excel-badge aktarilmadi">⏳ BEKLİYOR</span>';
        
        let sacIcon = "";
        if (item._sac === 'SAC1') sacIcon = '🔵';
        else if (item._sac === 'SAC2') sacIcon = '🟠';
        else if (item._sac === 'SAC3') sacIcon = '🟢';
        else if (item._sac === 'SAC4') sacIcon = '🟣';
        
        html += `<tr class="${rowClass}">
            <td style="text-align:center"><input type="checkbox" class="itemCheck" data-id="${item._id}" ${isChecked ? 'checked' : ''}></td>
            <td style="text-align:center">${sacIcon} ${item._sac}</td>
            <td style="text-align:center">${item["Seri No"] || '-'}</td>
            <td style="text-align:center"><strong>${item["Sıra No"] || '-'}</strong></td>
            <td style="text-align:center">${item["Grup"] || '-'}</td>
            <td style="text-align:center">${item["Olusturan"] || '-'}</td>
            <td style="text-align:center">${item["Kayıt Tarihi"] || '-'}</td>
            <td style="text-align:center">${statusHtml}</td>
            <td style="text-align:center">
                <button class="btn btn-info btn-sm" onclick="showDetail('${item._id}')" style="padding:4px 10px;">📄 Detay</button>
            </td>
        </tr>`;
    });
    
    html += `</tbody></div>`;
    document.getElementById("tabloContainer").innerHTML = html;
    document.getElementById("seciliSayi").innerHTML = selectedIds.size;
    
    // Sayfalama
    let pagHtml = "";
    if (totalPages > 1) {
        pagHtml += `<button onclick="goPage(1)" ${currentPage === 1 ? 'disabled' : ''}>⏮ İlk</button>`;
        pagHtml += `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀ Önceki</button>`;
        pagHtml += `<span style="padding:6px 14px;background:#2196f3;color:white;border-radius:6px">${currentPage} / ${totalPages}</span>`;
        pagHtml += `<button onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Sonraki ▶</button>`;
        pagHtml += `<button onclick="goPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Son ⏭</button>`;
    }
    document.getElementById("pagination").innerHTML = pagHtml;
    
    // Select All
    const selectAll = document.getElementById("selectAllCheck");
    if (selectAll) {
        selectAll.onclick = (e) => {
            pageData.forEach(item => {
                if (e.target.checked) selectedIds.add(item._id);
                else selectedIds.delete(item._id);
            });
            renderTable();
        };
    }
    
    // Tekli seçim
    document.querySelectorAll('.itemCheck').forEach(cb => {
        cb.onclick = (e) => {
            const id = cb.dataset.id;
            if (cb.checked) selectedIds.add(id);
            else selectedIds.delete(id);
            document.getElementById("seciliSayi").innerHTML = selectedIds.size;
        };
    });
}

function goPage(page) { currentPage = page; renderTable(); }

// ==================== DETAY GÖSTER ====================
function showDetail(id) {
    const item = displayData.find(x => x._id === id);
    if (!item) return;
    
    let totalMiktar = 0, totalKg = 0;
    (item.Kalemler || []).forEach(k => {
        totalMiktar += parseFloat(k["Miktar"]) || 0;
        totalKg += parseFloat(k["Toplam Kg"]) || 0;
    });
    
    alert(`📄 EVRAK DETAYI
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🏭 SAC: ${item._sac}
📋 Seri No: ${item["Seri No"]}
🔢 Sıra No: ${item["Sıra No"]}
📁 Grup: ${item["Grup"]}
👤 Oluşturan: ${item["Olusturan"]}
📅 Kayıt Tarihi: ${item["Kayıt Tarihi"]} ${item["Kayıt Saati"] || ''}
✅ Excel Durumu: ${item._excel ? 'AKTARILDI' : 'BEKLİYOR'}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📦 Toplam Miktar: ${totalMiktar.toFixed(2)}
⚖️ Toplam Ağırlık: ${totalKg.toFixed(2)} kg`);
}

// ==================== EXCEL'E AKTAR VE KALICI İŞARETLE ====================
async function excelAktarVeIsaretle() {
    if (selectedIds.size === 0) {
        showToast("❌ Lütfen aktarılacak evrak seçin!", true);
        return;
    }
    
    const selected = displayData.filter(item => selectedIds.has(item._id));
    if (selected.length === 0) {
        showToast("❌ Seçili evrak bulunamadı!", true);
        return;
    }
    
    showToast(`📎 ${selected.length} evrak Excel'e aktarılıyor ve işaretleniyor...`);
    
    // Excel dosyası oluştur
    let excelHtml = `<!DOCTYPE html>
    <html>
    <head><meta charset="UTF-8"><title>SAC Raporu</title>
    <style>th{background:#2c3e50;color:white;padding:10px}td{padding:8px;border:1px solid #ddd}</style>
    </head>
    <body>
    <h2>📊 SAC ENTEGRE RAPORU</h2>
    <p><strong>Oluşturan:</strong> ${currentUser}</p>
    <p><strong>Tarih:</strong> ${new Date().toLocaleString('tr-TR')}</p>
    <p><strong>Toplam Evrak:</strong> ${selected.length}</p>
    <table border="1">
        <thead>
            <tr>
                <th>SAC</th><th>Seri No</th><th>Sıra No</th><th>Grup</th>
                <th>Oluşturan</th><th>Kayıt Tarihi</th>
                <th>Stok Kodu</th><th>Stok İsmi</th>
                <th>Miktar</th><th>1 Plaka</th><th>Toplam Kg</th><th>Açıklama</th>
            </tr>
        </thead>
        <tbody>`;
    
    selected.forEach(item => {
        (item.Kalemler || []).forEach(k => {
            excelHtml += `<tr>
                <td>${item._sac}</td>
                <td>${item["Seri No"] || ''}</td>
                <td>${item["Sıra No"] || ''}</td>
                <td>${item["Grup"] || ''}</td>
                <td>${item["Olusturan"] || ''}</td>
                <td>${item["Kayıt Tarihi"] || ''}</td>
                <td>${k["Stok Kodu"] || ''}</td>
                <td>${k["Stok İsmi"] || ''}</td>
                <td>${parseFloat(k["Miktar"]) || 0}</td>
                <td>${parseFloat(k["1 Plaka (kg)"]) || 0}</td>
                <td>${parseFloat(k["Toplam Kg"]) || 0}</td>
                <td>${k["Açıklama"] || ''}</td>
            </tr>`;
        });
    });
    
    excelHtml += `</tbody></div></body></html>`;
    
    const blob = new Blob([excelHtml], { type: 'application/vnd.ms-excel' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `SAC_Rapor_${Date.now()}.xls`;
    link.click();
    URL.revokeObjectURL(link.href);
    
    // Firebase'e KALICI işaretle
    let successCount = 0;
    for (let item of selected) {
        const db = firebaseDBs[item._sacKey];
        if (db) {
            try {
                await db.ref(`${item._sacKey}Kesim/excelAktarilanlar/${item._id}`).set({
                    tarih: new Date().toISOString(),
                    kullanici: currentUser,
                    seriNo: item["Seri No"],
                    siraNo: item["Sıra No"]
                });
                item._excel = true;
                successCount++;
                console.log(`✅ İşaretlendi: ${item._id}`);
            } catch(e) {
                console.error("İşaretleme hatası:", e);
            }
        }
    }
    
    showToast(`✅ ${successCount} evrak KALICI olarak işaretlendi!`);
    renderTable();
}

// ==================== İŞARETİ KALDIR (SADECE ADMIN) ====================
async function isaretKaldir() {
    if (!isAdmin()) {
        showToast("⚠️ Bu işlem sadece Admin tarafından yapılabilir!", true);
        return;
    }
    if (selectedIds.size === 0) {
        showToast("❌ Lütfen işaretini kaldırmak istediğiniz evrakları seçin!", true);
        return;
    }
    if (!confirm("⚠️ Seçili evrakların 'Excel Aktarıldı' işareti KALICI olarak kaldırılacak. Devam etmek istiyor musunuz?")) return;
    
    const selected = displayData.filter(item => selectedIds.has(item._id));
    let successCount = 0;
    
    for (let item of selected) {
        const db = firebaseDBs[item._sacKey];
        if (db) {
            try {
                await db.ref(`${item._sacKey}Kesim/excelAktarilanlar/${item._id}`).remove();
                item._excel = false;
                successCount++;
            } catch(e) {
                console.error("İşaret kaldırma hatası:", e);
            }
        }
    }
    
    showToast(`⚠️ ${successCount} evrağın Excel işareti kaldırıldı!`);
    renderTable();
}

// ==================== ÖZET GÖSTER ====================
function showSummary() {
    const startDate = document.getElementById("ozetBas").value;
    const endDate = document.getElementById("ozetBit").value;
    
    if (!startDate || !endDate) {
        showToast("❌ Lütfen başlangıç ve bitiş tarihlerini seçin!", true);
        return;
    }
    
    const start = new Date(startDate);
    start.setHours(0, 0, 0, 0);
    const end = new Date(endDate);
    end.setHours(23, 59, 59, 999);
    
    const filtered = displayData.filter(item => {
        const itemDate = tarihParse(item["Kayıt Tarihi"]);
        if (!itemDate) return false;
        return itemDate >= start && itemDate <= end;
    });
    
    if (filtered.length === 0) {
        document.getElementById("ozetAlani").style.display = "block";
        document.getElementById("ozetAlani").innerHTML = '<div class="ozet-container"><div class="ozet-item"><div class="ozet-deger">Kayıt Yok</div></div></div>';
        return;
    }
    
    let totalMiktar = 0, totalKg = 0, excelCount = 0;
    filtered.forEach(item => {
        if (item._excel) excelCount++;
        (item.Kalemler || []).forEach(k => {
            totalMiktar += parseFloat(k["Miktar"]) || 0;
            totalKg += parseFloat(k["Toplam Kg"]) || 0;
        });
    });
    
    document.getElementById("ozetAlani").style.display = "block";
    document.getElementById("ozetAlani").innerHTML = `<div class="ozet-container">
        <div class="ozet-item"><div class="ozet-deger">${filtered.length}</div><div>📦 Evrak</div></div>
        <div class="ozet-item"><div class="ozet-deger">${excelCount}</div><div>✅ Excel Aktarılan</div></div>
        <div class="ozet-item"><div class="ozet-deger">${filtered.length - excelCount}</div><div>⏳ Bekleyen</div></div>
        <div class="ozet-item"><div class="ozet-deger">${totalMiktar.toFixed(2)}</div><div>🔢 Toplam Miktar</div></div>
        <div class="ozet-item"><div class="ozet-deger">${totalKg.toFixed(2)} kg</div><div>⚖️ Toplam Ağırlık</div></div>
    </div>`;
}

// ==================== SAC DEĞİŞTİR ====================
function changeSac(sac) {
    activeSac = sac;
    document.querySelectorAll('.sac-tab').forEach(tab => {
        if (tab.dataset.sac === sac) tab.classList.add('active');
        else tab.classList.remove('active');
    });
    filterData();
}

// ==================== ROL BİLGİSİ ====================
function updateRoleUI() {
    const badge = document.getElementById("userRolBadge");
    const btn = document.getElementById("isaretKaldirBtn");
    if (isAdmin()) {
        badge.innerHTML = '<span class="admin-badge">👑 Admin</span>';
        if (btn) btn.style.display = "inline-block";
    } else {
        badge.innerHTML = '<span style="background:#e3f2fd;color:#1565c0;padding:3px 12px;border-radius:20px;font-size:11px">👤 Kullanıcı</span>';
        if (btn) btn.style.display = "none";
    }
}

// ==================== EVENT LISTENER'LAR ====================
document.getElementById("loginBtn").onclick = () => {
    const user = document.getElementById("loginUsername").value.trim();
    const pass = document.getElementById("loginPassword").value.trim();
    
    if (USERS[user] && USERS[user] === pass) {
        currentUser = user;
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        document.getElementById("currentUser").innerHTML = user;
        updateRoleUI();
        initFirebase();
        loadAllData();
    } else {
        document.getElementById("loginError").style.display = "block";
        setTimeout(() => document.getElementById("loginError").style.display = "none", 2000);
    }
};

document.getElementById("logoutBtn").onclick = () => {
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
    selectedIds.clear();
};

document.getElementById("refreshBtn").onclick = () => {
    loadAllData();
};

};

document.getElementById("excelAktarBtn").onclick = () => excelAktarVeIsaretle();

document.getElementById("tumunuSecBtn").onclick = () => {
    displayData.forEach(item => selectedIds.add(item._id));
    renderTable();
};
document.getElementById("secimiTemizleBtn").onclick = () => {

    renderTable();
};
document.getElementById("ozetBtn").onclick = () => showSummary();

document.querySelectorAll('.sac-tab').forEach(tab => {
