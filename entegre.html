<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAC ENTEGRE - SON VERSİYON</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a1628; }
        .login-page { width: 100%; height: 100vh; background: linear-gradient(135deg, #0a1628, #1a2a4a); display: flex; justify-content: center; align-items: center; }
        .login-container { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; width: 400px; }
        .login-container h1 { color: white; text-align: center; margin-bottom: 20px; }
        .login-container input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid #ccc; border-radius: 8px; color: white; }
        .login-btn { width: 100%; padding: 12px; background: #4fc3f7; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .main-page { display: none; padding: 20px; background: #f5f7fb; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; }
        .sac-tab-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .sac-tab { padding: 10px 20px; background: #e0e0e0; border: none; border-radius: 8px; cursor: pointer; }
        .sac-tab.active { background: #2196f3; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #2c3e50; color: white; position: sticky; top: 0; }
        .excel-aktarilmis { background-color: #e8f5e9 !important; }
        .excel-badge.aktarildi { background: #4caf50; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; }
        .excel-badge.aktarilmadi { background: #95a5a6; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        .btn-info { background: #00bcd4; color: white; }
        .btn-success { background: #4caf50; color: white; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .pagination { display: flex; gap: 5px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .pagination button { padding: 5px 10px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 4px; }
        .pagination button.active { background: #2196f3; color: white; }
        .filtre-satir { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; align-items: flex-end; }
        .filtre-satir input, .filtre-satir select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; min-width: 120px; }
        .filtre-satir label { display: flex; align-items: center; gap: 5px; background: white; padding: 8px; border-radius: 4px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; z-index: 9999; animation: fadeOut 3s ease; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #e8f4f8; border-radius: 8px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .gecmis-table-container { max-height: 550px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        .admin-badge { background: #8e44ad; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; margin-left: 8px; }
        .secili-info { background: #2196f3; color: white; padding: 5px 10px; border-radius: 20px; font-size: 13px; }
    </style>
</head>
<body>

<div class="login-page" id="loginPage">
    <div class="login-container">
        <h1>🔄 SAC ENTEGRE</h1>
        <input type="text" id="loginUsername" placeholder="Kullanıcı Adı">
        <input type="password" id="loginPassword" placeholder="Şifre">
        <button class="login-btn" id="loginBtn">GİRİŞ</button>
        <div id="loginError" style="color: red; margin-top: 10px; display: none;">Hatalı giriş!</div>
    </div>
</div>

<div class="main-page" id="mainPage">
    <div class="container">
        <div class="user-info">
            <span>👤 <span id="currentUser"></span> <span id="userRolBadge"></span></span>
            <button class="logout-btn" id="logoutBtn">Çıkış</button>
        </div>
        
        <div class="sac-tab-bar">
            <button class="sac-tab active" data-sac="all">📊 TÜMÜ</button>
            <button class="sac-tab" data-sac="sac1">🔵 SAC1</button>
            <button class="sac-tab" data-sac="sac2">🟠 SAC2</button>
            <button class="sac-tab" data-sac="sac3">🟢 SAC3</button>
            <button class="sac-tab" data-sac="sac4">🟣 SAC4</button>
        </div>
        
        <div class="filtre-satir">
            <input type="text" id="filtre_seri" placeholder="Seri No">
            <input type="text" id="filtre_sira" placeholder="Sıra No">
            <select id="filtre_grup">
                <option value="">Tüm Gruplar</option>
                <option value="430">430</option>
                <option value="DKP">DKP</option>
                <option value="GALVANIZ">GALVANİZ</option>
                <option value="304">304</option>
                <option value="316">316</option>
                <option value="201">201</option>
            </select>
            <input type="date" id="filtre_tarih">
            <label><input type="checkbox" id="filtre_excel"> Sadece Excel Aktarılmış</label>
            <button class="btn btn-info" id="filtreUygulaBtn">🔍 Filtrele</button>
            <button class="btn" id="filtreTemizleBtn">🗑️ Temizle</button>
        </div>
        
        <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
            <button class="btn btn-success" id="seciliExceleAktarBtn">📎 Seçilenleri Excel'e Aktar ve İşaretle</button>
            <button class="btn" id="tumunuSecBtn">☑️ Tümünü Seç</button>
            <button class="btn" id="secimiTemizleBtn">⬜ Seçimi Temizle</button>
            <button class="btn btn-danger" id="excelIsaretiniKaldirBtn" style="display: none;">⚠️ Excel İşaretini Kaldır</button>
            <span class="secili-info">✅ <span id="seciliSayi">0</span> evrak seçili</span>
        </div>
        
        <div id="ozetAlani" style="display: none; margin-bottom: 15px; padding: 15px; background: linear-gradient(135deg, #1a237e, #283593); border-radius: 8px; color: white; text-align: center;"></div>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
            <span id="kayitSayisi" style="padding: 8px; background: #e8f4f8; border-radius: 6px;"></span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="ozetBaslangic" placeholder="Başlangıç">
                <input type="date" id="ozetBitis" placeholder="Bitiş">
                <button class="btn btn-warning btn-sm" id="ozetGosterBtn">📊 Özet Göster</button>
            </div>
        </div>
        
        <div class="gecmis-table-container" id="gecmisTablosu">
            <div class="loading"><div class="spinner"></div> Veriler yükleniyor...</div>
        </div>
        <div id="paginationContainer" class="pagination"></div>
    </div>
</div>

<script>
// Firebase Konfigürasyonları
const firebaseConfigs = {
    sac1: { apiKey: "AIzaSyDDFOpgvi0r3YHsZvYV6JgdCrZp1QZazPY", authDomain: "sac1-kesim.firebaseapp.com", databaseURL: "https://sac1-kesim-default-rtdb.europe-west1.firebasedatabase.app", projectId: "sac1-kesim", storageBucket: "sac1-kesim.firebasestorage.app", messagingSenderId: "419582241444", appId: "1:419582241444:web:2fdb127ca47bae8a011431" },
    sac2: { apiKey: "AIzaSyDTYnX6lNtrMOr5CJ98MTPrKp6vwR2JeZM", authDomain: "sac2-kesim.firebaseapp.com", databaseURL: "https://sac2-kesim-default-rtdb.europe-west1.firebasedatabase.app", projectId: "sac2-kesim", storageBucket: "sac2-kesim.firebasestorage.app", messagingSenderId: "385295068161", appId: "1:385295068161:web:ddd269dd34f66753d8a400" },
    sac3: { apiKey: "AIzaSyDHxIkQgAnazAVkNngUsSaII3Ij7DIvj9s", authDomain: "sac3-kesim.firebaseapp.com", databaseURL: "https://sac3-kesim-default-rtdb.europe-west1.firebasedatabase.app", projectId: "sac3-kesim", storageBucket: "sac3-kesim.firebasestorage.app", messagingSenderId: "365842219004", appId: "1:365842219004:web:91aaf46917786f8d9e7c79" },
    sac4: { apiKey: "AIzaSyAmlL-xVTWjahrz1VjXx-i86i0TuJ7HBdw", authDomain: "sac4-kesim.firebaseapp.com", databaseURL: "https://sac4-kesim-default-rtdb.europe-west1.firebasedatabase.app", projectId: "sac4-kesim", storageBucket: "sac4-kesim.firebasestorage.app", messagingSenderId: "62938924671", appId: "1:62938924671:web:a23687f982c53db6fa214a" }
};

const kullanicilar = { SAC1: "sac1sac", Muhammed: "mhm2468", Burak: "brk2468" };
const adminKullanicilar = ["Muhammed", "Burak"];

let aktifKullanici = null;
let aktifSac = "all";
let tumVeriler = { sac1: [], sac2: [], sac3: [], sac4: [] };
let gosterilenVeriler = [];
let seciliEvrakIdSet = new Set();
let currentPage = 1;
let pageSize = 20;

const firebaseDatabases = {};

function initFirebase() {
    for (const [name, config] of Object.entries(firebaseConfigs)) {
        try {
            let app;
            try { app = firebase.app(`app_${name}`); } 
            catch(e) { app = firebase.initializeApp(config, `app_${name}`); }
            firebaseDatabases[name] = firebase.database(app);
        } catch(e) { console.warn(name, "hata:", e); }
    }
}

function getEvrakId(item, sacKey) {
    return `${sacKey}_${item["Seri No"] || "SD"}_${item["Sıra No"]}`;
}

function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.backgroundColor = isError ? '#e74c3c' : '#27ae60';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function isAdmin() { return adminKullanicilar.includes(aktifKullanici); }

async function loadAllData() {
    document.getElementById("gecmisTablosu").innerHTML = '<div class="loading"><div class="spinner"></div> Veriler yükleniyor...</div>';
    
    for (const [sacName, db] of Object.entries(firebaseDatabases)) {
        try {
            const snapshot = await db.ref(`${sacName}Kesim/`).once('value');
            const data = snapshot.val();
            let veriler = [];
            if (data && data.gecmisVeriler && Array.isArray(data.gecmisVeriler)) veriler = data.gecmisVeriler;
            else if (data && Array.isArray(data)) veriler = data;
            
            const excelDurumlari = (data && data.excelAktarilanlar) ? data.excelAktarilanlar : {};
            
            tumVeriler[sacName] = veriler.map(item => {
                const evrakId = getEvrakId(item, sacName);
                return {
                    ...item,
                    _sacKaynak: sacName.toUpperCase(),
                    _sacKey: sacName,
                    _evrakId: evrakId,
                    _excelAktarildi: !!excelDurumlari[evrakId],
                    _excelTarihi: excelDurumlari[evrakId] ? excelDurumlari[evrakId].tarih : null
                };
            });
            console.log(`${sacName}: ${tumVeriler[sacName].length} kayıt, Excel aktarılan: ${tumVeriler[sacName].filter(i => i._excelAktarildi).length}`);
        } catch(e) { 
            console.error(sacName, e); 
            tumVeriler[sacName] = []; 
        }
    }
    
    const toplam = Object.values(tumVeriler).reduce((s, a) => s + a.length, 0);
    const aktarilan = Object.values(tumVeriler).reduce((s, a) => s + a.filter(i => i._excelAktarildi).length, 0);
    document.getElementById("syncStatus") && (document.getElementById("syncStatus").innerHTML = `✅ ${toplam} kayıt (${aktarilan} Excel aktarılmış)`);
    verileriGoster();
}

function verileriGoster() {
    let kaynak = [];
    if (aktifSac === "all") {
        for (const v of Object.values(tumVeriler)) kaynak.push(...v);
    } else {
        kaynak = [...(tumVeriler[aktifSac] || [])];
    }
    
    const seri = document.getElementById("filtre_seri").value.toLowerCase();
    const sira = document.getElementById("filtre_sira").value.toLowerCase();
    const grup = document.getElementById("filtre_grup").value;
    const tarihFiltre = document.getElementById("filtre_tarih").value;
    const sadeceExcel = document.getElementById("filtre_excel").checked;
    
    gosterilenVeriler = kaynak.filter(item => {
        if (seri && !(item["Seri No"] || "").toLowerCase().includes(seri)) return false;
        if (sira && !(item["Sıra No"] || "").toString().toLowerCase().includes(sira)) return false;
        if (grup && item["Grup"] !== grup) return false;
        if (tarihFiltre) {
            const itemTarih = item["Kayıt Tarihi"] || "";
            const filtreTarih = new Date(tarihFiltre).toLocaleDateString('tr-TR');
            if (itemTarih !== filtreTarih) return false;
        }
        if (sadeceExcel && !item._excelAktarildi) return false;
        return true;
    });
    
    currentPage = 1;
    tabloyuGoster();
}

function tabloyuGoster() {
    const totalPages = Math.ceil(gosterilenVeriler.length / pageSize);
    if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    
    const start = (currentPage - 1) * pageSize;
    const pageData = gosterilenVeriler.slice(start, start + pageSize);
    const aktarilanSayisi = gosterilenVeriler.filter(i => i._excelAktarildi).length;
    
    document.getElementById("kayitSayisi").innerHTML = `📊 Toplam: ${gosterilenVeriler.length} evrak (${aktarilanSayisi} Excel aktarılmış) | Sayfa: ${currentPage}/${totalPages || 1}`;
    
    if (gosterilenVeriler.length === 0) {
        document.getElementById("gecmisTablosu").innerHTML = '<div class="loading">📭 Kayıt bulunmuyor.</div>';
        document.getElementById("paginationContainer").innerHTML = "";
        document.getElementById("seciliSayi").innerHTML = seciliEvrakIdSet.size;
        return;
    }
    
    let html = `<table style="width:100%;">
        <thead><tr>
            <th style="width:40px"><input type="checkbox" id="selectAllCheckbox"></th>
            <th>SAC</th><th>Seri No</th><th>Sıra No</th><th>Grup</th><th>Oluşturan</th>
            <th>Kayıt Tarihi</th><th>Kayıt Saati</th><th>Excel Durumu</th><th>İşlem</th>
        </tr></thead><tbody>`;
    
    pageData.forEach(item => {
        const isChecked = seciliEvrakIdSet.has(item._evrakId);
        const rowClass = item._excelAktarildi ? 'excel-aktarilmis' : '';
        const excelText = item._excelAktarildi ? '<span class="excel-badge aktarildi">✅ Aktarıldı</span>' : '<span class="excel-badge aktarilmadi">⏳ Bekliyor</span>';
        let sacClass = "";
        if (item._sacKaynak === 'SAC1') sacClass = '🔵';
        else if (item._sacKaynak === 'SAC2') sacClass = '🟠';
        else if (item._sacKaynak === 'SAC3') sacClass = '🟢';
        else if (item._sacKaynak === 'SAC4') sacClass = '🟣';
        
        html += `<tr class="${rowClass}" data-evrak-id="${item._evrakId}">
            <td style="text-align:center"><input type="checkbox" class="evrak-checkbox" data-id="${item._evrakId}" ${isChecked ? 'checked' : ''}></td>
            <td style="text-align:center">${sacClass} ${item._sacKaynak}</td>
            <td style="text-align:center">${item["Seri No"] || '-'}</td>
            <td style="text-align:center"><strong>${item["Sıra No"] || '-'}</strong></td>
            <td style="text-align:center">${item["Grup"] || '-'}</td>
            <td style="text-align:center">${item["Olusturan"] || '-'}</td>
            <td style="text-align:center">${item["Kayıt Tarihi"] || '-'}</td>
            <td style="text-align:center">${item["Kayıt Saati"] || '-'}</td>
            <td style="text-align:center">${excelText}</td>
            <td style="text-align:center"><button class="btn btn-info btn-sm" onclick="detayGoster('${item._evrakId}')" style="padding:4px 8px;font-size:11px">📄 Detay</button></td>
        </tr>`;
    });
    
    html += `</tbody></div>`;
    document.getElementById("gecmisTablosu").innerHTML = html;
    document.getElementById("seciliSayi").innerHTML = seciliEvrakIdSet.size;
    
    // Pagination
    let pagHtml = "";
    if (totalPages > 1) {
        pagHtml += `<button onclick="sayfaDegistir(1)" ${currentPage === 1 ? 'disabled' : ''}>⏮ İlk</button>`;
        pagHtml += `<button onclick="sayfaDegistir(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀ Önceki</button>`;
        pagHtml += `<span style="padding:6px 12px;background:#2196f3;color:white;border-radius:6px">${currentPage} / ${totalPages}</span>`;
        pagHtml += `<button onclick="sayfaDegistir(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Sonraki ▶</button>`;
        pagHtml += `<button onclick="sayfaDegistir(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Son ⏭</button>`;
    }
    document.getElementById("paginationContainer").innerHTML = pagHtml;
    
    // Select All işlemi
    const selectAllCheckbox = document.getElementById("selectAllCheckbox");
    if (selectAllCheckbox) {
        selectAllCheckbox.onclick = (e) => {
            pageData.forEach(item => {
                if (e.target.checked) seciliEvrakIdSet.add(item._evrakId);
                else seciliEvrakIdSet.delete(item._evrakId);
            });
            tabloyuGoster();
        };
    }
    
    // Checkbox işlemleri
    document.querySelectorAll('.evrak-checkbox').forEach(cb => {
        cb.onclick = (e) => {
            e.stopPropagation();
            const id = cb.dataset.id;
            if (cb.checked) seciliEvrakIdSet.add(id);
            else seciliEvrakIdSet.delete(id);
            document.getElementById("seciliSayi").innerHTML = seciliEvrakIdSet.size;
        };
    });
}

function sayfaDegistir(page) { currentPage = page; tabloyuGoster(); }

function detayGoster(evrakId) {
    const item = gosterilenVeriler.find(i => i._evrakId === evrakId);
    if (!item) return;
    let kalemHtml = "";
    let toplamMiktar = 0, toplamKg = 0;
    (item.Kalemler || []).forEach(k => {
        const miktar = parseFloat(k["Miktar"]) || 0;
        const kg = parseFloat(k["Toplam Kg"]) || 0;
        toplamMiktar += miktar;
        toplamKg += kg;
        kalemHtml += `<tr><td>${k["Stok Kodu"] || '-'}</td><td>${k["Stok İsmi"] || '-'}</td><td>${miktar.toFixed(2)}</td><td>${kg.toFixed(2)}</td></tr>`;
    });
    alert(`📄 EVRAK DETAYI\n\nSAC: ${item._sacKaynak}\nSeri No: ${item["Seri No"]}\nSıra No: ${item["Sıra No"]}\nGrup: ${item["Grup"]}\nOluşturan: ${item["Olusturan"]}\nKayıt: ${item["Kayıt Tarihi"]} ${item["Kayıt Saati"]}\nExcel Durumu: ${item._excelAktarildi ? 'Aktarıldı' : 'Bekliyor'}\n\n📦 Toplam Miktar: ${toplamMiktar.toFixed(2)}\n⚖️ Toplam Kg: ${toplamKg.toFixed(2)}`);
}

async function excelAktarVeIsaretle() {
    if (seciliEvrakIdSet.size === 0) { showToast("Lütfen evrak seçin!", true); return; }
    
    const secilenler = gosterilenVeriler.filter(item => seciliEvrakIdSet.has(item._evrakId));
    
    // Excel oluştur
    let excel = `<html><head><meta charset="UTF-8"><style>th{background:#2c3e50;color:white;padding:8px}</style></head><body>
        <h2>SAC ENTEGRE RAPOR</h2>
        <p>Oluşturan: ${aktifKullanici} | Tarih: ${new Date().toLocaleString('tr-TR')}</p>
        <p>Seçili Evrak Sayısı: ${secilenler.length}</p>
        <table border="1">
            <tr><th>SAC</th><th>Seri No</th><th>Sıra No</th><th>Grup</th><th>Oluşturan</th><th>Kayıt Tarihi</th><th>Stok Kodu</th><th>Stok İsmi</th><th>Miktar</th><th>1 Plaka</th><th>Toplam Kg</th><th>Açıklama</th></tr>`;
    
    secilenler.forEach(item => {
        (item.Kalemler || []).forEach(k => {
            excel += `<tr>
                <td>${item._sacKaynak}</td><td>${item["Seri No"] || ''}</td><td>${item["Sıra No"] || ''}</td>
                <td>${item["Grup"] || ''}</td><td>${item["Olusturan"] || ''}</td><td>${item["Kayıt Tarihi"] || ''}</td>
                <td>${k["Stok Kodu"] || ''}</td><td>${k["Stok İsmi"] || ''}</td>
                <td>${k["Miktar"] || 0}</td><td>${k["1 Plaka (kg)"] || 0}</td>
                <td>${k["Toplam Kg"] || 0}</td><td>${k["Açıklama"] || ''}</td>
            </tr>`;
        });
    });
    excel += `</table></body></html>`;
    
    const blob = new Blob([excel], { type: 'application/vnd.ms-excel' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `SAC_Rapor_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xls`;
    link.click();
    URL.revokeObjectURL(link.href);
    
    // Firebase'e işaretle
    for (const item of secilenler) {
        const db = firebaseDatabases[item._sacKey];
        if (db) {
            await db.ref(`${item._sacKey}Kesim/excelAktarilanlar/${item._evrakId}`).set({
                tarih: new Date().toISOString(),
                kullanici: aktifKullanici,
                seriNo: item["Seri No"],
                siraNo: item["Sıra No"]
            });
            item._excelAktarildi = true;
        }
    }
    
    showToast(`✅ ${secilenler.length} evrak Excel'e aktarıldı ve KALICI olarak işaretlendi!`);
    verileriGoster();
}

async function excelIsaretiniKaldir() {
    if (!isAdmin()) { showToast("Bu işlem sadece Admin!", true); return; }
    if (seciliEvrakIdSet.size === 0) { showToast("Lütfen evrak seçin!", true); return; }
    if (!confirm("Seçili evrakların Excel işareti kalıcı olarak kaldırılacak. Devam?")) return;
    
    const secilenler = gosterilenVeriler.filter(item => seciliEvrakIdSet.has(item._evrakId));
    for (const item of secilenler) {
        const db = firebaseDatabases[item._sacKey];
        if (db) {
            await db.ref(`${item._sacKey}Kesim/excelAktarilanlar/${item._evrakId}`).remove();
            item._excelAktarildi = false;
        }
    }
    showToast(`⚠️ ${secilenler.length} evrağın Excel işareti kaldırıldı!`);
    verileriGoster();
}

function ozetGoster() {
    const baslangic = document.getElementById("ozetBaslangic").value;
    const bitis = document.getElementById("ozetBitis").value;
    if (!baslangic || !bitis) { showToast("Lütfen başlangıç ve bitiş tarihi seçin!", true); return; }
    
    const bas = new Date(baslangic);
    const bit = new Date(bitis);
    bit.setHours(23, 59, 59);
    
    const filtrelenmis = gosterilenVeriler.filter(item => {
        const tarih = item["Kayıt Tarihi"];
        if (!tarih) return false;
        const parts = tarih.split('.');
        if (parts.length !== 3) return false;
        const itemTarih = new Date(parts[2], parts[1] - 1, parts[0]);
        return itemTarih >= bas && itemTarih <= bit;
    });
    
    let toplamMiktar = 0, toplamKg = 0;
    filtrelenmis.forEach(item => {
        (item.Kalemler || []).forEach(k => {
            toplamMiktar += parseFloat(k["Miktar"] || 0);
            toplamKg += parseFloat(k["Toplam Kg"] || 0);
        });
    });
    
    document.getElementById("ozetAlani").style.display = "block";
    document.getElementById("ozetAlani").innerHTML = `
        <div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:15px">
            <div><strong>📅 Tarih Aralığı</strong><br>${new Date(baslangic).toLocaleDateString('tr-TR')} - ${new Date(bitis).toLocaleDateString('tr-TR')}</div>
            <div><strong>📦 Evrak Sayısı</strong><br>${filtrelenmis.length}</div>
            <div><strong>🔢 Toplam Miktar</strong><br>${toplamMiktar.toFixed(2)}</div>
            <div><strong>⚖️ Toplam Kg</strong><br>${toplamKg.toFixed(2)} kg</div>
        </div>`;
}

function sacDegistir(sac) {
    aktifSac = sac;
    document.querySelectorAll('.sac-tab').forEach(tab => {
        if (tab.dataset.sac === sac) tab.classList.add('active');
        else tab.classList.remove('active');
    });
    verileriGoster();
}

function rolBilgiGuncelle() {
    const badge = document.getElementById("userRolBadge");
    const btn = document.getElementById("excelIsaretiniKaldirBtn");
    if (isAdmin()) {
        badge.innerHTML = '<span class="admin-badge">Admin</span>';
        if (btn) btn.style.display = "inline-block";
    } else {
        badge.innerHTML = '';
        if (btn) btn.style.display = "none";
    }
}

// Event Listeners
document.getElementById("loginBtn").onclick = () => {
    const user = document.getElementById("loginUsername").value.trim();
    const pass = document.getElementById("loginPassword").value.trim();
    if (kullanicilar[user] && kullanicilar[user] === pass) {
        aktifKullanici = user;
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        document.getElementById("currentUser").innerHTML = user;
        rolBilgiGuncelle();
        initFirebase();
        loadAllData();
    } else {
        document.getElementById("loginError").style.display = "block";
    }
};

document.getElementById("logoutBtn").onclick = () => {
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
};

document.getElementById("filtreUygulaBtn").onclick = () => verileriGoster();
document.getElementById("filtreTemizleBtn").onclick = () => {
    document.getElementById("filtre_seri").value = "";
    document.getElementById("filtre_sira").value = "";
    document.getElementById("filtre_grup").value = "";
    document.getElementById("filtre_tarih").value = "";
    document.getElementById("filtre_excel").checked = false;
    verileriGoster();
};
document.getElementById("seciliExceleAktarBtn").onclick = () => excelAktarVeIsaretle();
document.getElementById("excelIsaretiniKaldirBtn").onclick = () => excelIsaretiniKaldir();
document.getElementById("tumunuSecBtn").onclick = () => {
    gosterilenVeriler.forEach(item => seciliEvrakIdSet.add(item._evrakId));
    tabloyuGoster();
};
document.getElementById("secimiTemizleBtn").onclick = () => {
    seciliEvrakIdSet.clear();
    tabloyuGoster();
};
document.getElementById("ozetGosterBtn").onclick = () => ozetGoster();

document.querySelectorAll('.sac-tab').forEach(tab => {
    tab.onclick = () => sacDegistir(tab.dataset.sac);
});

document.getElementById("loginPassword").addEventListener("keypress", (e) => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
});

window.sayfaDegistir = sayfaDegistir;
window.detayGoster = detayGoster;

console.log("✅ SAC Entegre Sistemi Hazır! (Excel Aktarım İşaretleme - Kalıcı Çözüm)");
</script>
