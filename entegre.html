<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAC ENTEGRE - SON</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0a1628; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; }
        .btn { padding: 8px 16px; margin: 3px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-success { background: #27ae60; color: white; }
        .btn-info { background: #00bcd4; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #7f8c8d; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #2c3e50; color: white; position: sticky; top: 0; }
        .excel-aktarilmis { background-color: #c8e6c9 !important; }
        .excel-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .excel-badge.aktarildi { background: #2e7d32; color: white; }
        .excel-badge.aktarilmadi { background: #757575; color: white; }
        .sac-tab { padding: 8px 20px; margin: 3px; background: #e0e0e0; border: none; border-radius: 8px; cursor: pointer; }
        .sac-tab.active { background: #2196f3; color: white; }
        .filtre-satir { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; align-items: flex-end; }
        .filtre-satir input, .filtre-satir select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; min-width: 120px; }
        .pagination { display: flex; gap: 5px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .pagination button { padding: 5px 10px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 4px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 8px; z-index: 9999; animation: fadeOut 3s; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #e8f4f8; border-radius: 8px; }
        .login-container { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; width: 400px; margin: 100px auto; }
        .login-container input { width: 100%; padding: 10px; margin: 10px 0; background: white; border: 1px solid #ddd; border-radius: 6px; }
        .login-btn { width: 100%; padding: 12px; background: #4fc3f7; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .gecmis-table-container { max-height: 500px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        .secili-info { background: #2196f3; color: white; padding: 5px 15px; border-radius: 20px; font-size: 13px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .auto-refresh-badge { background: #e8f4f8; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .checkbox-col { width: 40px; }
        .admin-badge { background: #8e44ad; color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; margin-left: 8px; }
    </style>
</head>
<body>

<div id="loginPage" style="display:flex; justify-content:center; align-items:center; height:100vh">
    <div class="login-container">
        <h2 style="color:white">🔄 SAC ENTEGRE</h2>
        <p style="color:#90a4ae; text-align:center; margin-bottom:15px;">Tüm Kesim Takip Sistemi</p>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button class="login-btn" id="girisBtn">GİRİŞ YAP</button>
        <div id="hata" style="color:#ef5350; margin-top:10px; text-align:center; display:none">Hatalı giriş!</div>
    </div>
</div>

<div id="mainPage" style="display:none">
    <div class="container">
        <div class="user-info">
            <span>👤 <span id="currentUser"></span> <span id="userRolBadge"></span></span>
            <button class="btn btn-danger" id="cikisBtn">Çıkış</button>
        </div>
        
        <div style="margin-bottom:15px; display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; align-items:center">
            <div>
                <button class="sac-tab active" data-sac="all">📊 TÜMÜ</button>
                <button class="sac-tab" data-sac="sac1">🔵 SAC1</button>
                <button class="sac-tab" data-sac="sac2">🟠 SAC2</button>
                <button class="sac-tab" data-sac="sac3">🟢 SAC3</button>
                <button class="sac-tab" data-sac="sac4">🟣 SAC4</button>
            </div>
            <div class="auto-refresh-badge">
                🔄 <span id="refreshStatus">Otomatik yenileme: 30 saniye</span>
                <button class="btn btn-info btn-sm" id="manualRefreshBtn" style="padding:4px 12px; margin-left:10px">Şimdi Yenile</button>
            </div>
        </div>
        
        <div class="filtre-satir">
            <input type="text" id="filtre_seri" placeholder="Seri No">
            <input type="text" id="filtre_sira" placeholder="Sıra No">
            <select id="filtre_grup">
                <option value="">Tüm Gruplar</option>
                <option value="430">430</option><option value="DKP">DKP</option>
                <option value="GALVANIZ">GALVANİZ</option><option value="304">304</option>
                <option value="316">316</option><option value="201">201</option>
            </select>
            <label><input type="checkbox" id="filtre_excel"> ✅ Sadece Excel Aktarılmış</label>
            <button class="btn btn-info" id="filtreBtn">🔍 Filtrele</button>
            <button class="btn btn-secondary" id="temizleBtn">🗑️ Temizle</button>
        </div>
        
        <div style="margin:15px 0; display:flex; gap:10px; flex-wrap:wrap; align-items:center">
            <button class="btn btn-success" id="excelBtn">📎 Seçilenleri Excel'e Aktar ve KALICI İşaretle</button>
            <button class="btn btn-danger" id="isaretKaldirBtn" style="display:none">⚠️ Excel İşaretini Kaldır (Admin)</button>
            <button class="btn btn-secondary" id="tumunuSecBtn">☑️ Tümünü Seç</button>
            <button class="btn btn-secondary" id="secimiTemizleBtn">⬜ Seçimi Temizle</button>
            <span class="secili-info">✅ <span id="seciliSayi">0</span> seçili</span>
            <div style="margin-left:auto">
                <input type="date" id="ozetBas" style="padding:6px">
                <span>→</span>
                <input type="date" id="ozetBit" style="padding:6px">
                <button class="btn btn-warning" id="ozetBtn">📊 Özet</button>
            </div>
        </div>
        
        <div id="ozetAlani" style="display:none; margin-bottom:15px; padding:15px; background:linear-gradient(135deg,#1a237e,#283593); border-radius:12px; color:white; text-align:center"></div>
        
        <div class="status-bar">
            <span id="kayitSayisi" style="padding:5px 12px; background:#e8f4f8; border-radius:20px; font-size:12px"></span>
            <span id="sonGuncelleme" style="font-size:11px; color:#666"></span>
        </div>
        
        <div class="gecmis-table-container" id="tabloContainer">
            <div class="loading"><div class="spinner"></div> Veriler yükleniyor...</div>
        </div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<script>
// TÜM SAC FIREBASE KONFIGLERİ
const SAC_CONFIGS = {
    sac1: { apiKey: "AIzaSyDDFOpgvi0r3YHsZvYV6JgdCrZp1QZazPY", databaseURL: "https://sac1-kesim-default-rtdb.europe-west1.firebasedatabase.app" },
    sac2: { apiKey: "AIzaSyDTYnX6lNtrMOr5CJ98MTPrKp6vwR2JeZM", databaseURL: "https://sac2-kesim-default-rtdb.europe-west1.firebasedatabase.app" },
    sac3: { apiKey: "AIzaSyDHxIkQgAnazAVkNngUsSaII3Ij7DIvj9s", databaseURL: "https://sac3-kesim-default-rtdb.europe-west1.firebasedatabase.app" },
    sac4: { apiKey: "AIzaSyAmlL-xVTWjahrz1VjXx-i86i0TuJ7HBdw", databaseURL: "https://sac4-kesim-default-rtdb.europe-west1.firebasedatabase.app" }
};

const USERS = { Muhammed: "mhm2468", Burak: "brk2468", SAC1: "sac1sac" };

let currentUser = null;
let activeSac = "all";
let allData = [];
let displayData = [];
let selectedIds = new Set();
let currentPage = 1;
let pageSize = 20;
let refreshInterval = null;

let firebaseDBs = {};

// FIREBASE BAŞLAT
function initFirebase() {
    for (let [name, config] of Object.entries(SAC_CONFIGS)) {
        try {
            let appName = `app_${name}`;
            let app;
            try { app = firebase.app(appName); } catch(e) { 
                app = firebase.initializeApp({
                    apiKey: config.apiKey,
                    databaseURL: config.databaseURL,
                    projectId: name + "-kesim"
                }, appName);
            }
            firebaseDBs[name] = firebase.database(app);
            console.log(`✅ ${name.toUpperCase()} bağlandı`);
        } catch(e) { console.error(name, e); }
    }
}

function showToast(msg, isErr = false) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.style.backgroundColor = isErr ? '#e74c3c' : '#27ae60';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

function isAdmin() {
    return currentUser === "Muhammed" || currentUser === "Burak";
}

function updateRoleUI() {
    const badge = document.getElementById("userRolBadge");
    const kaldirBtn = document.getElementById("isaretKaldirBtn");
    if (isAdmin()) {
        badge.innerHTML = '<span class="admin-badge">Admin</span>';
        if (kaldirBtn) kaldirBtn.style.display = "inline-block";
    } else {
        badge.innerHTML = '';
        if (kaldirBtn) kaldirBtn.style.display = "none";
    }
}

// TÜM VERİLERİ YÜKLE
async function loadAllData() {
    console.log("📥 Veriler yükleniyor...");
    document.getElementById("tabloContainer").innerHTML = '<div class="loading"><div class="spinner"></div> Veriler yükleniyor...</div>';
    
    let yeniData = [];
    
    for (let [sacName, db] of Object.entries(firebaseDBs)) {
        try {
            const snapshot = await db.ref(`${sacName}Kesim/`).once('value');
            const data = snapshot.val();
            
            if (data && data.gecmisVeriler) {
                const aktarilanlar = data.aktarilanEvraklar || [];
                console.log(`📁 ${sacName.toUpperCase()}: ${data.gecmisVeriler.length} kayıt, Excel aktarılan: ${aktarilanlar.length} -> [${aktarilanlar.join(', ')}]`);
                
                for (let item of data.gecmisVeriler) {
                    const siraNo = item["Sıra No"];
                    const isExcel = aktarilanlar.includes(siraNo);
                    
                    yeniData.push({
                        ...item,
                        _sac: sacName.toUpperCase(),
                        _sacKey: sacName,
                        _siraNo: siraNo,
                        _excel: isExcel,
                        _uniqueId: `${sacName}_${siraNo}`
                    });
                }
            }
        } catch(e) {
            console.error(sacName, e);
        }
    }
    
    allData = yeniData;
    const excelCount = allData.filter(d => d._excel).length;
    console.log(`✅ TOPLAM: ${allData.length} kayıt, Excel aktarılan: ${excelCount}`);
    
    document.getElementById("sonGuncelleme").innerHTML = `🕐 Son güncelleme: ${new Date().toLocaleTimeString('tr-TR')}`;
    
    filterData();
}

// FİLTRELE
function filterData() {
    let source = [...allData];
    
    if (activeSac !== "all") {
        source = source.filter(item => item._sacKey === activeSac);
    }
    
    const seri = document.getElementById("filtre_seri").value.toLowerCase();
    const sira = document.getElementById("filtre_sira").value.toLowerCase();
    const grup = document.getElementById("filtre_grup").value;
    const sadeceExcel = document.getElementById("filtre_excel").checked;
    
    displayData = source.filter(item => {
        if (seri && !(item["Seri No"] || "").toLowerCase().includes(seri)) return false;
        if (sira && !(item._siraNo || "").toString().toLowerCase().includes(sira)) return false;
        if (grup && item["Grup"] !== grup) return false;
        if (sadeceExcel && !item._excel) return false;
        return true;
    });
    
    currentPage = 1;
    renderTable();
}

// TABLO GÖSTER
function renderTable() {
    const totalPages = Math.ceil(displayData.length / pageSize);
    if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    
    const start = (currentPage - 1) * pageSize;
    const pageData = displayData.slice(start, start + pageSize);
    const excelCount = displayData.filter(i => i._excel).length;
    
    document.getElementById("kayitSayisi").innerHTML = `📊 Toplam: ${displayData.length} evrak (${excelCount} Excel aktarılmış) | Sayfa ${currentPage}/${totalPages || 1}`;
    document.getElementById("seciliSayi").innerHTML = selectedIds.size;
    
    if (displayData.length === 0) {
        document.getElementById("tabloContainer").innerHTML = '<div class="loading">📭 Kayıt bulunmuyor.</div>';
        document.getElementById("pagination").innerHTML = "";
        return;
    }
    
    let html = `<table style="width:100%">
        <thead>
            <tr>
                <th class="checkbox-col"><input type="checkbox" id="selectAllCheck"></th>
                <th>SAC</th><th>Seri No</th><th>Sıra No</th><th>Grup</th>
                <th>Oluşturan</th><th>Kayıt Tarihi</th><th>Durum</th><th>İşlem</th>
            </tr>
        </thead>
        <tbody>`;
    
    for (let item of pageData) {
        const isChecked = selectedIds.has(item._uniqueId);
        const rowClass = item._excel ? 'excel-aktarilmis' : '';
        const status = item._excel ? 
            '<span class="excel-badge aktarildi">✅ AKTARILDI</span>' : 
            '<span class="excel-badge aktarilmadi">⏳ BEKLİYOR</span>';
        
        let sacIcon = item._sac === 'SAC1' ? '🔵' : (item._sac === 'SAC2' ? '🟠' : (item._sac === 'SAC3' ? '🟢' : '🟣'));
        
        html += `<tr class="${rowClass}">
            <td style="text-align:center"><input type="checkbox" class="itemCheck" data-id="${item._uniqueId}" ${isChecked ? 'checked' : ''}></td>
            <td style="text-align:center">${sacIcon} ${item._sac}</td>
            <td style="text-align:center">${item["Seri No"] || '-'}</td>
            <td style="text-align:center"><strong>${item._siraNo}</strong></td>
            <td style="text-align:center">${item["Grup"] || '-'}</td>
            <td style="text-align:center">${item["Olusturan"] || '-'}</td>
            <td style="text-align:center">${item["Kayıt Tarihi"] || '-'}</td>
            <td style="text-align:center">${status}</td>
            <td style="text-align:center"><button class="btn btn-info btn-sm" onclick="showDetail('${item._uniqueId}')" style="padding:4px 8px">📄 Detay</button></td>
        </tr>`;
    }
    
    html += `</tbody></div>`;
    document.getElementById("tabloContainer").innerHTML = html;
    
    // Sayfalama
    let pagHtml = "";
    if (totalPages > 1) {
        pagHtml += `<button onclick="goPage(1)" ${currentPage === 1 ? 'disabled' : ''}>⏮</button>`;
        pagHtml += `<button onclick="goPage(${currentPage-1})" ${currentPage === 1 ? 'disabled' : ''}>◀</button>`;
        pagHtml += `<span style="padding:5px 12px;background:#2196f3;color:white;border-radius:6px">${currentPage}/${totalPages}</span>`;
        pagHtml += `<button onclick="goPage(${currentPage+1})" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>`;
        pagHtml += `<button onclick="goPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>⏭</button>`;
    }
    document.getElementById("pagination").innerHTML = pagHtml;
    
    // Select All
    const selectAll = document.getElementById("selectAllCheck");
    if (selectAll) {
        selectAll.onclick = (e) => {
            for (let item of pageData) {
                if (e.target.checked) selectedIds.add(item._uniqueId);
                else selectedIds.delete(item._uniqueId);
            }
            renderTable();
        };
    }
    
    // Tekli seçim
    for (let cb of document.querySelectorAll('.itemCheck')) {
        cb.onclick = (e) => {
            const id = cb.dataset.id;
            if (cb.checked) selectedIds.add(id);
            else selectedIds.delete(id);
            document.getElementById("seciliSayi").innerHTML = selectedIds.size;
        };
    }
}

function goPage(page) { currentPage = page; renderTable(); }

function showDetail(uniqueId) {
    const item = allData.find(i => i._uniqueId === uniqueId);
    if (!item) return;
    
    let toplamM = 0, toplamKg = 0;
    for (let k of (item.Kalemler || [])) {
        toplamM += parseFloat(k["Miktar"]) || 0;
        toplamKg += parseFloat(k["Toplam Kg"]) || 0;
    }
    
    alert(`📄 EVRAK DETAYI\n\nSAC: ${item._sac}\nSıra No: ${item._siraNo}\nGrup: ${item["Grup"]}\nOluşturan: ${item["Olusturan"]}\nTarih: ${item["Kayıt Tarihi"]}\nExcel Durumu: ${item._excel ? '✅ AKTARILDI' : '⏳ BEKLİYOR'}\n\n📦 Toplam Miktar: ${toplamM.toFixed(2)}\n⚖️ Toplam Kg: ${toplamKg.toFixed(2)}`);
}

// EXCEL'E AKTAR VE KALICI İŞARETLE (DÜZELTİLMİŞ SAYI FORMATI)
async function excelAktarVeIsaretle() {
    if (selectedIds.size === 0) {
        showToast("❌ Lütfen evrak seçin!", true);
        return;
    }
    
    // Butonu devre dışı bırak (çift tıklamayı engelle)
    const excelBtn = document.getElementById("excelBtn");
    excelBtn.disabled = true;
    excelBtn.textContent = "⏳ İşlem yapılıyor...";
    
    // Seçilenleri grupla
    let secilenBySac = {};
    for (let id of selectedIds) {
        let [sac, sira] = id.split("_");
        if (!secilenBySac[sac]) secilenBySac[sac] = [];
        secilenBySac[sac].push(parseInt(sira));
    }
    
    console.log("Seçilenler:", secilenBySac);
    
    // Excel oluştur - SAYI FORMATI DÜZELTİLDİ
    let excel = `<html><head><meta charset="UTF-8">
    <style>
        th { background: #2c3e50; color: white; padding: 10px; }
        td { padding: 8px; border: 1px solid #ddd; }
        .sayi { text-align: right; }
        .sayi4 { text-align: right; }
    </style>
    </head><body>
        <h2>SAC ENTEGRE RAPORU</h2>
        <p>Tarih: ${new Date().toLocaleString('tr-TR')}</p>
        <p>Kullanıcı: ${currentUser}</p>
        <p>Toplam Evrak: ${selectedIds.size}</p>
        <table border="1">
            <thead>
                <tr>
                    <th>SAC</th><th>Sıra No</th><th>Grup</th><th>Oluşturan</th>
                    <th>Kayıt Tarihi</th><th>Stok Kodu</th><th>Stok İsmi</th>
                    <th>Miktar</th><th>1 Plaka (kg)</th><th>Toplam Kg</th><th>Açıklama</th>
                </tr>
            </thead>
            <tbody>`;
    
    for (let [sac, siraList] of Object.entries(secilenBySac)) {
        for (let sira of siraList) {
            const item = allData.find(i => i._sacKey === sac && i._siraNo === sira);
            if (item && item.Kalemler) {
                for (let k of item.Kalemler) {
                    // Sayısal değerleri al (nokta ile ayır)
                    let miktar = parseFloat(k["Miktar"]) || 0;
                    let plaka = parseFloat(k["1 Plaka (kg)"]) || 0;
                    let toplamKg = parseFloat(k["Toplam Kg"]) || 0;
                    
                    // Virgülü noktaya çevir (güvenlik için)
                    if (typeof k["Miktar"] === 'string') miktar = parseFloat(k["Miktar"].replace(/,/g, '.')) || 0;
                    if (typeof k["1 Plaka (kg)"] === 'string') plaka = parseFloat(k["1 Plaka (kg)"].replace(/,/g, '.')) || 0;
                    if (typeof k["Toplam Kg"] === 'string') toplamKg = parseFloat(k["Toplam Kg"].replace(/,/g, '.')) || 0;
                    
                    excel += `<tr>
                        <td>${item._sac}</td>
                        <td>${sira}</td>
                        <td>${item["Grup"] || ''}</td>
                        <td>${item["Olusturan"] || ''}</td>
                        <td>${item["Kayıt Tarihi"] || ''}</td>
                        <td>${k["Stok Kodu"] || ''}</td>
                        <td style="text-align:left">${k["Stok İsmi"] || ''}</td>
                        <td class="sayi">${miktar.toFixed(2).replace('.', ',')}</td>
                        <td class="sayi4">${plaka.toFixed(4).replace('.', ',')}</td>
                        <td class="sayi">${toplamKg.toFixed(2).replace('.', ',')}</td>
                        <td>${k["Açıklama"] || ''}</td>
                    </tr>`;
                }
            }
        }
    }
    
    excel += `</tbody></div></body></html>`;
    
    const blob = new Blob([excel], { type: 'application/vnd.ms-excel' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `SAC_Rapor_${Date.now()}.xls`;
    link.click();
    URL.revokeObjectURL(link.href);
    
    // FIREBASE'E KAYDET
    let toplamIsaretlenen = 0;
    
    for (let [sac, siraList] of Object.entries(secilenBySac)) {
        const db = firebaseDBs[sac];
        if (db) {
            const snap = await db.ref(`${sac}Kesim/aktarilanEvraklar`).once('value');
            let mevcut = snap.val() || [];
            let yeniListe = [...new Set([...mevcut, ...siraList])];
            await db.ref(`${sac}Kesim/aktarilanEvraklar`).set(yeniListe);
            console.log(`📝 ${sac.toUpperCase()}: Aktarılanlar güncellendi -> [${yeniListe.join(', ')}]`);
            
            for (let item of allData) {
                if (item._sacKey === sac && siraList.includes(item._siraNo)) {
                    item._excel = true;
                    toplamIsaretlenen++;
                }
            }
        }
    }
    
    showToast(`✅ ${toplamIsaretlenen} evrak KALICI olarak işaretlendi!`);
    
    // Butonu geri aktif et
    excelBtn.disabled = false;
    excelBtn.textContent = "📎 Seçilenleri Excel'e Aktar ve KALICI İşaretle";
    
    renderTable();
}

// ==================== EXCEL İŞARETİNİ KALDIR (SADECE ADMIN) ====================
async function excelIsaretiniKaldir() {
    // Admin kontrolü
    if (!isAdmin()) {
        showToast("❌ Bu işlem sadece Admin tarafından yapılabilir!", true);
        return;
    }
    
    if (selectedIds.size === 0) {
        showToast("❌ Lütfen işareti kaldırılacak evrak seçin!", true);
        return;
    }
    
    if (!confirm("⚠️ Seçili evrakların 'Excel Aktarıldı' işareti KALICI olarak kaldırılacak ve 'Bekliyor' durumuna dönecek. Devam etmek istiyor musunuz?")) {
        return;
    }
    
    // Butonu devre dışı bırak
    const kaldirBtn = document.getElementById("isaretKaldirBtn");
    kaldirBtn.disabled = true;
    kaldirBtn.textContent = "⏳ İşlem yapılıyor...";
    
    // Seçilenleri grupla
    let secilenBySac = {};
    for (let id of selectedIds) {
        let [sac, sira] = id.split("_");
        if (!secilenBySac[sac]) secilenBySac[sac] = [];
        secilenBySac[sac].push(parseInt(sira));
    }
    
    console.log("🔓 İşareti kaldırılacaklar:", secilenBySac);
    
    let toplamKaldirilan = 0;
    
    for (let [sac, siraList] of Object.entries(secilenBySac)) {
        const db = firebaseDBs[sac];
        if (db) {
            const snap = await db.ref(`${sac}Kesim/aktarilanEvraklar`).once('value');
            let mevcut = snap.val() || [];
            // Seçili sıra numaralarını listeden çıkar
            let yeniListe = mevcut.filter(sira => !siraList.includes(sira));
            await db.ref(`${sac}Kesim/aktarilanEvraklar`).set(yeniListe);
            console.log(`🔓 ${sac.toUpperCase()}: İşaret kaldırıldı -> [${yeniListe.join(', ')}]`);
            
            for (let item of allData) {
                if (item._sacKey === sac && siraList.includes(item._siraNo)) {
                    item._excel = false;
                    toplamKaldirilan++;
                }
            }
        }
    }
    
    showToast(`🔓 ${toplamKaldirilan} evrakın Excel işareti kaldırıldı! Artık 'Bekliyor' olarak görünecek.`);
    
    // Butonu geri aktif et
    kaldirBtn.disabled = false;
    kaldirBtn.textContent = "⚠️ Excel İşaretini Kaldır (Admin)";
    
    // Seçimleri temizle
    selectedIds.clear();
    renderTable();
}

// ÖZET GÖSTER
function showSummary() {
    const startDate = document.getElementById("ozetBas").value;
    const endDate = document.getElementById("ozetBit").value;
    
    if (!startDate || !endDate) {
        showToast("Lütfen başlangıç ve bitiş tarihlerini seçin!", true);
        return;
    }
    
    const start = new Date(startDate);
    start.setHours(0,0,0,0);
    const end = new Date(endDate);
    end.setHours(23,59,59,999);
    
    const filtered = displayData.filter(item => {
        const tarih = item["Kayıt Tarihi"];
        if (!tarih) return false;
        const parts = tarih.split('.');
        if (parts.length !== 3) return false;
        const itemDate = new Date(parts[2], parts[1]-1, parts[0]);
        return itemDate >= start && itemDate <= end;
    });
    
    if (filtered.length === 0) {
        document.getElementById("ozetAlani").style.display = "block";
        document.getElementById("ozetAlani").innerHTML = '<div class="loading">Kayıt yok</div>';
        return;
    }
    
    let toplamM = 0, toplamKg = 0, excelCount = 0;
    for (let item of filtered) {
        if (item._excel) excelCount++;
        for (let k of (item.Kalemler || [])) {
            toplamM += parseFloat(k["Miktar"]) || 0;
            toplamKg += parseFloat(k["Toplam Kg"]) || 0;
        }
    }
    
    document.getElementById("ozetAlani").style.display = "block";
    document.getElementById("ozetAlani").innerHTML = `
        <div style="display:flex; justify-content:space-around; flex-wrap:wrap; gap:15px">
            <div><strong>📅 ${new Date(startDate).toLocaleDateString('tr-TR')} - ${new Date(endDate).toLocaleDateString('tr-TR')}</strong></div>
            <div><strong>📦 Evrak</strong><br>${filtered.length}</div>
            <div><strong>✅ Excel</strong><br>${excelCount}</div>
            <div><strong>⏳ Bekleyen</strong><br>${filtered.length - excelCount}</div>
            <div><strong>🔢 Miktar</strong><br>${toplamM.toFixed(2)}</div>
            <div><strong>⚖️ Kg</strong><br>${toplamKg.toFixed(2)}</div>
        </div>`;
}

function changeSac(sac) {
    activeSac = sac;
    for (let tab of document.querySelectorAll('.sac-tab')) {
        if (tab.dataset.sac === sac) tab.classList.add('active');
        else tab.classList.remove('active');
    }
    filterData();
}
